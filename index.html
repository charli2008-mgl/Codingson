<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: #f0f4f8;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .main-container {
        display: flex;
        width: 1100px;
        height: 620px;
        background: white;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12);
        border: 1px solid rgba(0, 0, 0, 0.08);
      }

      .side-panel {
        flex: 0.7;
        background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        padding: 30px;
      }

      .side-panel.right {
        background: linear-gradient(225deg, #4a90e2 0%, #357abd 100%);
      }

      .side-panel i.bg-icon {
        font-size: 60px;
        margin-bottom: 20px;
        opacity: 0.3;
      }

      .form-side {
        flex: 1.5;
        padding: 60px 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: white;
      }

      h2 {
        font-size: 32px;
        color: #1a202c;
        margin-bottom: 10px;
        font-weight: 800;
        text-align: center;
      }
      .subtitle {
        font-size: 15px;
        color: #718096;
        margin-bottom: 40px;
        text-align: center;
      }

      .input-group {
        margin-bottom: 22px;
      }
      .input-group label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        color: #4a5568;
        margin-bottom: 10px;
        text-transform: uppercase;
      }

      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }
      .input-wrapper i {
        position: absolute;
        left: 18px;
        color: #a0aec0;
        font-size: 18px;
      }
      .input-wrapper input {
        width: 100%;
        padding: 16px 16px 16px 50px;
        border: 2px solid #edf2f7;
        border-radius: 12px;
        font-size: 16px;
        outline: none;
        background: #f8fafc;
        transition: 0.3s ease;
      }

      .input-wrapper input:focus {
        border-color: #4a90e2;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
      }

      .options-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        margin-bottom: 30px;
        color: #4a5568;
      }

      .forgot-link {
        color: #4a90e2;
        text-decoration: none;
        font-weight: 600;
      }

      .login-btn {
        width: 100%;
        padding: 18px;
        background: #4a90e2;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s ease;
      }

      .login-btn:hover {
        background: #357abd;
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(74, 144, 226, 0.2);
      }

      .footer-text {
        margin-top: 25px;
        text-align: center;
        font-size: 14px;
        color: #718096;
      }
      .footer-text a {
        color: #4a90e2;
        font-weight: 700;
        text-decoration: none;
      }

      @media (max-width: 1000px) {
        .main-container {
          width: 95%;
          height: auto;
          flex-direction: column;
        }
        .side-panel {
          display: none;
        }
        .form-side {
          padding: 40px 30px;
        }
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="side-panel">
        <p style="font-size: 13px; opacity: 0.8; margin-top: 10px"></p>
      </div>

      <div class="form-side">
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your account details.</p>
        <form
          onsubmit="
            window.location.href = 'main.html';
            return false;
          ">
          <div class="input-group">
            <label>Email Address</label>
            <div class="input-wrapper">
              <i class="fa-regular fa-envelope"></i>
              <input type="email" placeholder="login@gmail.com" required />
            </div>
          </div>

          <div class="input-group">
            <label>Password</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-lock"></i>
              <input type="password" placeholder="••••••••" required />
            </div>
          </div>

          <div class="options-row">
            <label style="display: flex; align-items: center; cursor: pointer">
              <input
                type="checkbox"
                style="margin-right: 10px; accent-color: #4a90e2" />
              Remember me
            </label>
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>

          <button type="submit" class="login-btn">Sign In</button>
        </form>

        <p class="footer-text">
          Don't have an account? <a href="register.html">Create an account</a>
        </p>
      </div>

      <div class="side-panel right">
        <p style="font-size: 13px; opacity: 0.8; margin-top: 10px"></p>
      </div>
    </div>
  </body>
</html>
